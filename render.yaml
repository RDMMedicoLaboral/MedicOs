services:
  - type: web
    name: ece-agenda
    runtime: node
    plan: free
    rootDir: .
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        sync: false
    # ADMIN_SECRET: defínela tú (cualquier texto largo y difícil de adivinar).
    # Es la clave que usas en /admin.html para dar de alta consultorios nuevos.
    # NOTA: los discos persistentes de Render requieren un plan de pago.
    # En el plan gratis, la base de datos SQLite vive en el sistema de
    # archivos efímero del servicio: sobrevive mientras el servicio esté
    # activo (incluyendo dormir/despertar por inactividad), pero se borra
    # cada vez que hay un nuevo despliegue (cada git push). Para persistencia
    # real y gratuita, ver la sección "Siguientes pasos" del README
    # (Render Postgres gratis).
